name: example_session
root: ./
startup_window: crazyflies_start
pre_window: |
  source <%= @settings["setup_name"] %>
windows:
  - crazyflies_start:
      layout: tiled
      panes:
        - ros2 launch hero_crazyflies_benchmarking aideck_streamer_udp.launch.py
        - sleep 5;ros2 launch hero_crazyflies_benchmarking system_launch.py
        - sleep 10;ros2 launch hero_crazyflies_benchmarking aruco_recognition.launch.py
        - sleep 10;ros2 launch hero_crazyflies_benchmarking octomap_server.launch.py
        - python /root/ros2_ws/src/hero_crazyflies_benchmarking/scripts/joy_emergency.py
        - history -s "ros2 bag record -s mcap --all"